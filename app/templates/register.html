{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header">

                <h3>Create Account</h3>

            </div>

            <div class="card-body">

                {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
                {% endif %}

                <form method="post">

                    <div class="mb-3">

                        <label>Name</label>

                        <input
                            class="form-control"
                            name="full_name"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Email</label>

                        <input
                            class="form-control"
                            type="email"
                            name="email"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Password</label>

                        <input
                            class="form-control"
                            type="password"
                            name="password"
                            required>

                    </div>

                    <button
                        class="btn btn-primary w-100">

                        Register

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<hr>

<p class="text-center">

    Already have an account?

    <a href="/auth/login">
        Login Here
    </a>

</p>

{% endblock %}
