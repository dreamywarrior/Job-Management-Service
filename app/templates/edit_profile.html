{% extends "base.html" %}

{% block content %}

<div class="container">

    <!-- ================= Header ================= -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold">

                Edit Profile

            </h2>

            <p class="text-muted mb-0">

                Update your account information.

            </p>

        </div>

        <a
            href="/auth/profile"
            class="btn btn-outline-secondary">

            <i class="bi bi-arrow-left"></i>

            Back

        </a>

    </div>


    <!-- ================= Form ================= -->

    <div class="card shadow-sm">

        <div class="card-body">

            {% if error %}

            <div class="alert alert-danger">

                {{ error }}

            </div>

            {% endif %}

            <form
                method="post"
                action="/auth/profile/edit">

                <div class="mb-3">

                    <label class="form-label">

                        Full Name

                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="full_name"
                        required
                        value="{{ user.full_name }}">

                </div>

                <div class="mb-4">

                    <label class="form-label">

                        Email Address

                    </label>

                    <input
                        type="email"
                        class="form-control"
                        name="email"
                        required
                        value="{{ user.email }}">

                </div>

                <div class="d-flex gap-2">

                    <button
                        type="submit"
                        class="btn btn-primary">

                        <i class="bi bi-check-circle-fill"></i>

                        Save Changes

                    </button>

                    <a
                        href="/auth/profile"
                        class="btn btn-secondary">

                        Cancel

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
