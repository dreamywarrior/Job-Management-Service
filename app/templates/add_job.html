{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">
        Add New Job
    </h2>

    <form action="/jobs/add" method="post">

        <!-- ================= BASIC INFORMATION ================= -->

        <div class="card shadow mb-4">

            <div class="card-header bg-primary text-white">

                <h5 class="mb-0">Basic Information</h5>

            </div>

            <div class="card-body">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Job Title</label>

                        <input
                            class="form-control"
                            name="title"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Company</label>

                        <input
                            class="form-control"
                            name="company"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Location</label>

                        <input
                            class="form-control"
                            name="location">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Department</label>

                        <input
                            class="form-control"
                            name="department">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Industry</label>

                        <input
                            class="form-control"
                            name="industry">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Function</label>

                        <input
                            class="form-control"
                            name="function">

                    </div>

                </div>

            </div>

        </div>

        <!-- ================= EMPLOYMENT DETAILS ================= -->

        <div class="card shadow mb-4">

            <div class="card-header bg-success text-white">

                <h5 class="mb-0">Employment Details</h5>

            </div>

            <div class="card-body">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Employment Type</label>

                        <select
                            class="form-select"
                            name="employment_type">

                            <option>Full-time</option>
                            <option>Part-time</option>
                            <option>Contract</option>
                            <option>Temporary</option>
                            <option>Internship</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Salary Range</label>

                        <input
                            class="form-control"
                            name="salary_range">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Required Experience</label>

                        <input
                            class="form-control"
                            name="required_experience">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Required Education</label>

                        <input
                            class="form-control"
                            name="required_education">

                    </div>

                </div>

            </div>

        </div>

        <!-- ================= JOB DESCRIPTION ================= -->

        <div class="card shadow mb-4">

            <div class="card-header bg-info text-white">

                <h5 class="mb-0">Job Description</h5>

            </div>

            <div class="card-body">

                <div class="mb-3">

                    <label class="form-label">
                        Company Profile
                    </label>

                    <textarea
                        class="form-control"
                        rows="3"
                        name="company_profile"></textarea>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Job Description
                    </label>

                    <textarea
                        class="form-control"
                        rows="6"
                        name="description"
                        required></textarea>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Requirements
                    </label>

                    <textarea
                        class="form-control"
                        rows="5"
                        name="requirements"></textarea>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Benefits
                    </label>

                    <textarea
                        class="form-control"
                        rows="4"
                        name="benefits"></textarea>

                </div>

            </div>

        </div>

        <!-- ================= ADDITIONAL DETAILS ================= -->

        <div class="card shadow mb-4">

            <div class="card-header bg-secondary text-white">

                <h5 class="mb-0">Additional Information</h5>

            </div>

            <div class="card-body">

                <div class="form-check mb-3">

                    <input
                        class="form-check-input"
                        type="checkbox"
                        value="true"
                        name="telecommuting">

                    <label class="form-check-label">

                        Remote / Telecommuting Available

                    </label>

                </div>

                <div class="form-check mb-3">

                    <input
                        class="form-check-input"
                        type="checkbox"
                        value="true"
                        name="has_company_logo">

                    <label class="form-check-label">

                        Company Logo Available

                    </label>

                </div>

                <div class="form-check">

                    <input
                        class="form-check-input"
                        type="checkbox"
                        value="true"
                        name="has_questions">

                    <label class="form-check-label">

                        Includes Screening Questions

                    </label>

                </div>

            </div>

        </div>

        <div class="text-end">

            <button
                class="btn btn-success btn-lg">

                Save Job

            </button>

            <a
                href="/jobs"
                class="btn btn-secondary btn-lg">

                Cancel

            </a>

        </div>

    </form>

</div>

{% endblock %}
